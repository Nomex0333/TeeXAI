<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    height:100vh;
    background: radial-gradient(circle at top,#140022,#000);
    overflow:hidden;
    color:white;
}

.intro{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.logo-main{
    width:130px;
    filter:blur(25px);
    opacity:0;
    animation:reveal 2s forwards;
}

@keyframes reveal{
    to{filter:blur(0);opacity:1;transform:scale(1);}
}

.logo-top{
    position:absolute;
    top:25px;
    left:40px;
    width:80px;
    opacity:0;
    transition:1s;
}

.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.9);
    width:380px;
    padding:50px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter: blur(25px);
    box-shadow:0 0 80px rgba(128,0,255,0.3);
    text-align:center;
    opacity:0;
    transition:1s;
}

.input-group{margin:18px 0;text-align:left;}
.input-group input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#7a00ff,#b366ff);
    color:white;
    cursor:pointer;
    transition:0.3s;
}
button:hover{box-shadow:0 0 25px #7a00ff;}

a{color:#c299ff;text-decoration:none;}

.float{
    position:absolute;
    opacity:0.15;
    animation:float linear infinite;
}
@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

.cursor{
    position:fixed;
    width:250px;
    height:250px;
    border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle,rgba(128,0,255,0.4),transparent);
    transform:translate(-50%,-50%);
    z-index:999;
}

.trail{
    position:fixed;
    width:12px;
    height:12px;
    background:#a64dff;
    border-radius:50%;
    pointer-events:none;
    opacity:0.5;
}
</style>
</head>

<body>

<div class="intro">
    <img src="../assets/logo.png" class="logo-main" alt="App Logo">
</div>

<img src="../assets/logo.png" class="logo-top" alt="App Logo">

<div class="card" id="card">
    <h2>Welcome 👋</h2>
    <div id="type" style="height:22px;opacity:0.7;margin-bottom:15px;"></div>

    <div class="input-group">
        <input placeholder="Enter Email">
    </div>

    <div class="input-group">
        <input placeholder="Enter Password" type="password">
    </div>

    <button id="btn">Login</button>

    <p style="margin-top:15px;">
        Don't have an account?
        <a href="Signup-page.html">Sign up now</a>
    </p>
</div>

<div class="cursor"></div>

<script>
setTimeout(()=>{
    document.querySelector(".intro").style.display="none";
    document.querySelector(".logo-top").style.opacity="1";

    let card=document.getElementById("card");
    card.style.opacity="1";
    card.style.transform="translate(-50%,-50%) scale(1)";

    floating();
    typing();
},2000);

function floating(){
    const arr=["H₂O","O₂","+","÷","×","A","অ"];
    for(let i=0;i<30;i++){
        let e=document.createElement("div");
        e.className="float";
        e.innerText=arr[Math.floor(Math.random()*arr.length)];
        e.style.left=Math.random()*100+"vw";
        e.style.fontSize=(14+Math.random()*30)+"px";
        e.style.animationDuration=(6+Math.random()*10)+"s";
        document.body.appendChild(e);
    }
}

function typing(){
    let text="We are happy to see you.";
    let i=0;
    let el=document.getElementById("type");

    let interval=setInterval(()=>{
        el.innerHTML+=text[i];
        i++;
        if(i>=text.length) clearInterval(interval);
    },40);
}

const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
    cursor.style.left=e.clientX+"px";
    cursor.style.top=e.clientY+"px";

    let t=document.createElement("div");
    t.className="trail";
    t.style.left=e.clientX+"px";
    t.style.top=e.clientY+"px";
    document.body.appendChild(t);

    setTimeout(()=>t.remove(),400);
});

const btn=document.getElementById("btn");
btn.addEventListener("mousemove",(e)=>{
    let rect=btn.getBoundingClientRect();
    let x=e.clientX-rect.left-rect.width/2;
    let y=e.clientY-rect.top-rect.height/2;
    btn.style.transform=`translate(${x*0.2}px,${y*0.2}px)`;
});
btn.addEventListener("mouseleave",()=>btn.style.transform="translate(0,0)");
</script>

</body>
</html>
